when:
  - event: cron
    cron: check-scheduled-posts
  - event: manual

steps:
  - name: publish scheduled posts
    image: node:22-alpine
    commands:
      - node ./scripts/publish-scheduled.mjs
    environment:
      REPO:
        from_secret: github_repo
      GITHUB_USERNAME:
        from_secret: github_username
      GITHUB_TOKEN:
        from_secret: github_token

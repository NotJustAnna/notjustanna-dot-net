when:
  - event: push
    branch: main

steps:
  - name: build
    image: node:22-alpine
    commands:
      - corepack enable
      - pnpm install --frozen-lockfile
      - pnpm run build

  - name: deploy
    image: woodpeckerci/plugin-s3
    settings:
      bucket: notjustanna.net
      endpoint: http://garage.garage.svc.cluster.local:3900
      region: garage
      path_style: true
      source: dist/**/*
      strip_prefix: dist/
      delete: true
      overwrite: true
      access_key:
        from_secret: garage_access_key
      secret_key:
        from_secret: garage_secret_key
    when:
      - branch: main
        event: push

  - name: purge cache
    image: alpine/curl
    environment:
      FASTLY_SERVICE_ID: FfTtesTkCKpFDfBTk5jJo7
      FASTLY_API_TOKEN:
        from_secret: fastly_api_token
    commands:
      - |
        curl -sf -X POST "https://api.fastly.com/service/$FASTLY_SERVICE_ID/purge_all" \
          -H "Fastly-Key: $FASTLY_API_TOKEN" \
          -H "Accept: application/json"
    when:
      - branch: main
        event: push

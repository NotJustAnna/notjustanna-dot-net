steps:
  - name: build
    image: node:22-alpine
    commands:
      - corepack enable
      - pnpm install --frozen-lockfile
      - pnpm run build

  - name: deploy
    image: woodpeckerci/plugin-s3
    settings:
      bucket: notjustanna.net
      endpoint: http://garage.garage.svc.cluster.local:3900
      region: garage
      path_style: true
      source: dist/**/*
      strip_prefix: dist/
      delete: true
      overwrite: true
      access_key:
        from_secret: garage_access_key
      secret_key:
        from_secret: garage_secret_key
    when:
      - branch: main
        event: push

  - name: purge cache
    image: alpine/curl
    environment:
      CF_ZONE_ID: ddd7f26d5a532a13de1971ea2637a4f5
      CF_API_TOKEN:
        from_secret: cf_api_token
    commands:
      - |
        curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
          -H "Authorization: Bearer $CF_API_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"purge_everything":true}'
    when:
      - branch: main
        event: push
